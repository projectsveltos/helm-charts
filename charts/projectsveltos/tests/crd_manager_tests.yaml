# $schema: https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json
suite: CRD Manager
templates:
  - templates/crd-manager-job.yaml
  - templates/crd-rbac.yaml
tests:
  - it: present by default
    asserts:
      - hasDocuments:
          count: 1
        template: templates/crd-manager-job.yaml
      - hasDocuments:
          count: 2
        template: templates/crd-rbac.yaml
  - it: enabled=false
    set:
      crdManagerJob.enabled: false
    asserts:
      - hasDocuments:
          count: 0
        template: templates/crd-manager-job.yaml
      - hasDocuments:
          count: 0
        template: templates/crd-rbac.yaml
