apiVersion: batch/v1
kind: Job
metadata:
  name: register-mgmt-cluster-job
  namespace: {{ .Release.Namespace | quote }}
  labels:
  {{- include "projectsveltos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: {{ .Values.registerMgmtClusterJob.backoffLimit }}
  template:
    spec:
      securityContext:
        runAsNonRoot: true
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - args:
      {{- range .Values.registerMgmtClusterJob.registerMgmtCluster.args }}
        - {{ . }}
      {{- end }}
      {{- range $key, $value := .Values.registerMgmtClusterJob.registerMgmtCluster.extraArgs }}
        {{- if $value }}
        - --{{ $key }}={{ $value }}
        {{- else }}
        - --{{ $key }}
        {{- end }}
      {{- end }}
        env:
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              divisor: "0"
              resource: limits.memory
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              divisor: "0"
              resource: limits.cpu
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        {{- with .Values.registerMgmtClusterJob.registerMgmtCluster.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        image: "{{ include "projectsveltos.image" (dict "ctx" . "component" .Values.registerMgmtClusterJob.registerMgmtCluster) }}"
        imagePullPolicy: {{ .Values.registerMgmtClusterJob.registerMgmtCluster.imagePullPolicy
          }}
        name: register-mgmt-cluster
        resources: {{- toYaml .Values.registerMgmtClusterJob.registerMgmtCluster.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.registerMgmtClusterJob.registerMgmtCluster.containerSecurityContext | nindent 10 }}
        {{- with .Values.registerMgmtClusterJob.registerMgmtCluster.extraVolumes }}
        volumeMounts:
{{ include "projectsveltos.extraVolumeMounts" . | nindent 8 }}
        {{- end }}
      {{- with .Values.registerMgmtClusterJob.registerMgmtCluster.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.registerMgmtClusterJob.registerMgmtCluster.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.registerMgmtClusterJob.registerMgmtCluster.extraVolumes }}
      volumes:
    {{ include "projectsveltos.extraVolumes" . | nindent 6 }}
      {{- end }}
      restartPolicy: OnFailure
      serviceAccountName: register-mgmt-cluster
  ttlSecondsAfterFinished: 240
