global:
  registry: docker.io
  useDigest: false
  imagePullSecrets: []
dashboard:
  annotations: {}
  dashboard:
    image:
      repository: projectsveltos/dashboard
      tag: v1.12.0
      digest: sha256:1f5971bc62a5e321a99ddf26e5bbb2983aaae36036daa4207079afe4b81ce75b
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  ports:
    - port: 80
      protocol: TCP
      targetPort: 5173
  replicas: 1
  type: ClusterIP
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: dashboard.cluster.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - dashboard.cluster.local

  # Gateway API HTTPRoute configuration
  # NOTE: Gateway API support is in EXPERIMENTAL status
  # Support depends on your Gateway controller implementation
  # Some controllers may require additional configuration (e.g., BackendTLSPolicy for HTTPS backends)
  # Refer to https://gateway-api.sigs.k8s.io/implementations/ for controller-specific details
  httpRoute:
    enabled: false
    labels: {}
    annotations: {}
    # parentRefs defines the Gateway(s) that this HTTPRoute is attached to
    parentRefs: []
      # - name: gateway
      # namespace: gateway-system
      # sectionName: https
      # port: 443
    # hostnames defines the hostnames for routing
    hostnames:
      - dashboard.cluster.local
    # rules defines routing rules
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        # filters:
        #   - type: RequestHeaderModifier
        #     requestHeaderModifier:
        #       add:
        #         - name: X-Custom-Header
        #           value: custom-value
  tolerations: []
  nodeSelector:
    kubernetes.io/os: linux
  affinity: {}
# auth configures authentication for the Sveltos Dashboard.
# By default, manual token authentication is used.
# To enable OIDC authentication, uncomment and fill in the oidc section.
# auth:
#   oidc:
#     # Issuer URL of your OIDC provider
#     issuer: ""
#     # Client ID registered with your OIDC provider (must be a public client)
#     clientId: ""
#     # Full redirect URI after OIDC login (defaults to <origin>/oidc-callback if unset)
#     redirectUri: ""

kubernetesClusterDomain: cluster.local
uiBackendManager:
  manager:
    args:
      - --diagnostics-address=:8443
      - --v=5
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    image:
      repository: projectsveltos/ui-backend
      tag: v1.12.0
      digest: sha256:ac72b5e65c6a0f732a128367a950eabd89d213b982af9efac8b6856964d23cfc
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  podSecurityContext:
    runAsNonRoot: true
  ports:
    - port: 80
      protocol: TCP
      targetPort: 8080
  replicas: 1
  type: ClusterIP
  tolerations: []
  nodeSelector:
    kubernetes.io/os: linux
  affinity: {}
